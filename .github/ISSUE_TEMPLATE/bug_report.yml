name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect to happen, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: The exact command(s) you ran.
      placeholder: |
        1. give-back assess owner/repo --verbose
        2. ...
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Output
      description: Paste the full terminal output (redact tokens if present).
      render: shell
  - type: input
    id: version
    attributes:
      label: give-back version
      description: Run `give-back --version` to find this.
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      description: Run `python --version` to find this.
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other

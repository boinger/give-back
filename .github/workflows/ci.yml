name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        env:
          PYV: ${{ matrix.python-version }}
        run: uv sync --group dev --python "$PYV"

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Format check
        run: uv run ruff format --check src/ tests/

      - name: Verify interpreter binding
        run: |
          uv run python --version
          uv run mypy --version

      - name: Type check
        env:
          PYV: ${{ matrix.python-version }}
        run: uv run mypy src/ --python-version "$PYV"

      - name: Test
        run: uv run pytest tests/ -v --cov=src/give_back --cov-report=term

      - name: Sloppylint regression gate
        run: uv run --with sloppylint sloppylint --max-score 151 src/
